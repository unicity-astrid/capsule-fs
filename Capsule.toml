[package]
name = "astrid-capsule-fs"
version = "0.1.0"
description = "Core filesystem tools for the Astrid OS"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "fs-tools"
file = "astrid_capsule_fs.wasm"
type = "executable"
# Note: home:// write is intentionally omitted — fs-tools should not write
# to ~/.astrid/ (which contains keys, audit DBs, etc.). Read is permitted for
# file inspection. Write access to home should be granted per-capsule only
# when needed (e.g. a plugin installer capsule).
capabilities = { fs_read = ["cwd://", "home://"], fs_write = ["cwd://"] }

[capabilities]
ipc_publish = ["tool.v1.execute.*.result", "tool.v1.response.describe.*"]
ipc_subscribe = ["tool.v1.execute.read_file", "tool.v1.execute.write_file", "tool.v1.execute.replace_in_file", "tool.v1.execute.list_directory", "tool.v1.execute.grep_search", "tool.v1.execute.create_directory", "tool.v1.execute.delete_file", "tool.v1.execute.move_file", "tool.v1.request.describe"]

[[interceptor]]
event = "tool.v1.execute.read_file"
action = "tool_execute_read_file"

[[interceptor]]
event = "tool.v1.execute.write_file"
action = "tool_execute_write_file"

[[interceptor]]
event = "tool.v1.execute.replace_in_file"
action = "tool_execute_replace_in_file"

[[interceptor]]
event = "tool.v1.execute.list_directory"
action = "tool_execute_list_directory"

[[interceptor]]
event = "tool.v1.execute.grep_search"
action = "tool_execute_grep_search"

[[interceptor]]
event = "tool.v1.execute.create_directory"
action = "tool_execute_create_directory"

[[interceptor]]
event = "tool.v1.execute.delete_file"
action = "tool_execute_delete_file"

[[interceptor]]
event = "tool.v1.execute.move_file"
action = "tool_execute_move_file"

[[interceptor]]
event = "tool.v1.request.describe"
action = "tool_describe"
